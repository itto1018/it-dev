services:
  # 1. Next.js 開発サーバー
  app:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile.app
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: pnpm dev
    networks:
      - it_dev-net

  # 2. PlaywrightMCP サーバー
  playwright_mcp:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile.playwright
    environment:
    - WEB_SERVER_URL=http://app:3000
    volumes:
      - .:/app
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "8931:8931"
    command: npx -y playwright-mcp --headless --isolated --browser chromium --no-sandbox --port 8931 --config .claude/playwright-config.json
    depends_on:
      - app
    networks:
      - it_dev-net

  # 3. Claude Code
  claude-code:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile.claude
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://mcp-playwright:8931/mcp
    volumes:
      - .:/app
      - .:/app/.captures
      - claude-config:/root/.config
    working_dir: /app
    stdin_open: true
    tty: true
    depends_on:
      - playwright_mcp
    networks:
      - it_dev-net

networks:
  it_dev-net:
    driver: bridge

volumes:
  claude-config: