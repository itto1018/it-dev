services:
  # 1. Next.js 開発サーバー
  app:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile.app
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: pnpm dev
    networks:
      - it_dev-net

  # 2. PlaywrightMCP サーバー
  playwright_mcp:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: playwright-mcp-server
    ports:
      - "8931:8931"
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - WEB_SERVER_URL=http://app:3000
    command: >
      sh -c "
        npx playwright install firefox &&
        npm install -g @playwright/mcp@latest &&
        npx @playwright/mcp@latest --port 8931 --browser firefox --headless --isolated --no-sandbox
      "
    depends_on:
      - app
    networks:
      - it_dev-net
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - .:/app
    working_dir: /app

  # 3. Claude Code
  claude-code:
    build:
      context: .
      dockerfile: ./.docker/Dockerfile.claude
    container_name: claude-code
    environment:
      - MCP_SERVER_URL=http://playwright-mcp-server:8931
    volumes:
      - .:/app
      - .:/app/.captures
      - claude-config:/root/.config
    working_dir: /app
    stdin_open: true
    tty: true
    depends_on:
      - playwright_mcp
    networks:
      - it_dev-net

networks:
  it_dev-net:
    driver: bridge

volumes:
  claude-config: